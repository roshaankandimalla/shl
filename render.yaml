services:
  - type: web
    name: shl-assessment-recommender
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VOYAGE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DENSE_EMBED_MODEL
        value: voyage-4-large
      - key: RERANK_MODEL
        value: rerank-2.5
      - key: SPLADE_MODEL
        value: naver/splade-cocondenser-ensembledistil
      - key: GENERATION_MODEL
        value: gemini-3.1-flash-lite
